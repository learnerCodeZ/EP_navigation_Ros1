# TEB 局部路径规划器参数 (适配麦克纳姆轮全向运动)

TebLocalPlannerROS:

  # ========================
  # 全向机器人 (麦轮)
  # ========================
  holonomic_robot: true

  # ========================
  # 速度限制
  # ========================
  max_vel_x: 0.8               # 前向最大速度 (m/s)
  max_vel_y: 0.3               # 横向最大速度 (m/s) 麦轮支持侧移
  max_vel_theta: 1.0           # 最大旋转速度 (rad/s)
  max_vel_x_backwards: 0.8     # 后退最大速度 (m/s)
  acc_lim_x: 0.5               # 前向最大加速度 (m/s^2)
  acc_lim_y: 0.3               # 横向最大加速度 (m/s^2)
  acc_lim_theta: 1.0           # 最大旋转加速度 (rad/s^2)

  # ========================
  # 目标容忍度
  # ========================
  xy_goal_tolerance: 0.10      # 目标位置容忍误差 (m)
  yaw_goal_tolerance: 0.05     # 目标姿态容忍误差 (rad)
  free_goal_vel: false         # 到达目标时速度归零

  # ========================
  # 轨迹配置
  # ========================
  dt_ref: 0.1                  # 局部路径规划的期望时间分辨率 (s)
  dt_hysteresis: 0.05          # 允许的滞后时间差 (s)
  min_samples: 3               # 最小轨迹采样数
  global_plan_overwrite_orientation: true
  global_plan_viapoint_sep: 0.5 # 全局路径插值点间距 (m)
  max_global_plan_lookahead_dist: 3.0  # 最大前瞻距离 (m)
  force_reinit_new_goal_dist: 1.0
  feasibility_check_no_poses: 5

  # ========================
  # 障碍物
  # ========================
  min_obstacle_dist: 0.15      # 与障碍物的最小距离 (m)
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 1.5
  obstacle_poses_affected: 30
  inflation_dist: 0.3

  # ========================
  # 足迹模型 (多边形)
  # ========================
  footprint_model:
    type: "polygon"
    vertices: [[-0.18, -0.14], [-0.18, 0.14], [0.18, 0.14], [0.18, -0.14]]

  # ========================
  # 优化参数
  # ========================
  no_inner_iterations: 3
  no_outer_iterations: 3
  penalty_epsilon: 0.1

  # ========================
  # 权重
  # ========================
  weight_kinematics_forward_drive: 0.1   # 低权重 (麦轮全向)
  weight_kinematics_turning_radius: 0.0  # 不需要转弯半径
  weight_optimaltime: 1.0               # 时间最优权重
  weight_obstacle: 50.0                 # 障碍物距离权重
  weight_inflation: 0.1                 # 膨胀层权重
  weight_viapoint: 1.0                  # 路径点跟踪权重
  weight_adapt_factor: 2.0              # 自适应权重调整因子

  # ========================
  # 发布与可视化
  # ========================
  publish_feedback: true
  visualization:
    publish_enabled: true
