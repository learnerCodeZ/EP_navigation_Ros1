# robot_localization EKF 融合配置
# 融合 EP 里程计 (/odom) 和 HI12 外置 IMU (/imu)，输出 /odometry/filtered

frequency: 30
sensor_timeout: 0.1
two_d_mode: true

# TF 框架
map_frame: map
odom_frame: odom
base_link_frame: base_link
world_frame: odom

# 发布 odom -> base_link 的 TF 变换
publish_tf: true
publish_acceleration: false

# ========================
# 输入1: EP 里程计 /odom (世界坐标系)
# ========================
odom0: /odom
odom0_config: [true,  true,  false,  # 融合里程计的绝对位置 X, Y
               false, false, false,  # 放弃绝对角度（使用 IMU）
               true,  true,  false,  # 融合世界坐标系速度 vx, vy
               false, false, true,   # 融合角速度 vyaw
               false, false, false]
odom0_queue_size: 10
odom0_nodelay: true
odom0_differential: false
odom0_relative: false

# ========================
# 输入2: HI12 外置 IMU /imu（9 轴，含磁力计绝对航向）
# ========================

imu0: /imu
imu0_config: [false, false, false,  # x, y, z
               false, false, true,   # 【关键】只融合 IMU 的绝对 Yaw 角作为方向基准
               false, false, false,  # 【修正】坚决关闭 IMU 的 vx, vy, vz 速度融合！
               false, false, true,   # 融合 IMU 的角速度 vyaw
               true,  true,  false]  # 融合 IMU 的线加速度 ax, ay
imu0_queue_size: 10
imu0_nodelay: true
imu0_differential: false

# HI12 提供磁力计绝对航向，设为 false 让 EKF 直接使用 IMU 的绝对 Yaw 值
# 无需像 EP IMU 那样将上电 yaw=0 视为 0 度
imu0_relative: false

# ========================
# 过程噪声协方差
