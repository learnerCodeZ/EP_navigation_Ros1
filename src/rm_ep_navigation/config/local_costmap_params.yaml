# 局部代价地图参数

local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 5.0
  publish_frequency: 2.0
  static_map: false
  rolling_window: true
  transform_tolerance: 0.5
  width: 4.0
  height: 4.0
  resolution: 0.05
  robot_radius: 0.20

  # 插件
  plugins:
    - {name: obstacles,        type: "costmap_2d::VoxelLayer"}
    - {name: inflation_layer,  type: "costmap_2d::InflationLayer"}
