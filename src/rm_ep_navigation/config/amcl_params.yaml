# AMCL 蒙特卡洛定位参数

# 滤波器
min_particles: 100
max_particles: 2000
kld_err: 0.01
kld_z: 0.99

# 更新条件
update_min_d: 0.10             # 最小平移更新距离 (m)
update_min_a: 0.10             # 最小旋转更新角度 (rad)
resample_interval: 2           # 重采样间隔
transform_tolerance: 0.5       # TF 变换容忍时间 (秒)
recovery_alpha_slow: 0.001     # 慢恢复权重
recovery_alpha_fast: 0.1       # 快恢复权重

# 初始位姿
initial_pose_x: 0.0
initial_pose_y: 0.0
initial_pose_a: 0.0
initial_cov_xx: 0.25
initial_cov_yy: 0.25
initial_cov_aa: 0.0685

# 激光雷达模型 (likelihood_field)
laser_model_type: likelihood_field
laser_likelihood_max_dist: 2.0
laser_max_beams: 60
laser_z_hit: 0.8
laser_z_rand: 0.05
laser_z_short: 0.10
laser_z_max: 0.05

# 里程计模型 (全向轮使用 omni 模型)
odom_model_type: omni-corrected
odom_alpha1: 0.2               # 旋转时旋转噪声
odom_alpha2: 0.2               # 平移时旋转噪声
odom_alpha3: 0.2               # 平移时平移噪声
odom_alpha4: 0.2               # 旋转时平移噪声

# TF 框架
odom_frame_id: odom
base_frame_id: base_link
global_frame_id: map

# 话题
use_map_topic: false
first_map_only: false
gui_publish_rate: 5.0
save_pose_rate: 0.5
