# RoboMaster EP 驱动参数配置

# EP 连接参数
ep_sn: ""                  # EP 序列号 (SN)，路由器模式下用于发现设备
ep_conn_type: "sta"        # 连接类型: "sta"(路由器模式) / "ap"(直连模式)
ep_ip: ""                  # EP IP地址 (留空则通过SN自动发现)

# 发布频率 (Hz)
odom_rate: 20              # 里程计发布频率
imu_rate: 20               # IMU数据发布频率

# TF参数
odom_frame_id: "odom"
base_frame_id: "base_link"
imu_frame_id: "imu_link"

# 控制参数
cmd_vel_timeout: 0.5       # 速度指令超时时间 (秒)，超时后自动停止
enable_cmd_vel: true       # 是否启用 /cmd_vel 控制
