# RoboMaster EP 驱动参数配置

# EP 连接参数
ep_sn: "3JKDH3B001891M"     # EP 序列号 (SN)，路由器模式下用于发现设备
ep_conn_type: "rndis"        # 连接类型: "sta"(路由器模式) / "ap"(直连模式) / "rndis"(USB模式)
ep_ip: ""                  # EP IP地址 (留空则通过SN自动发现)

# 发布频率 (Hz)
odom_rate: 20              # 里程计和IMU发布频率（共用）

# TF参数
odom_frame_id: "odom"
base_frame_id: "base_link"
imu_frame_id: "imu_link"

# 控制参数
cmd_vel_timeout: 0.5       # 速度指令超时时间 (秒)，超时后自动停止
enable_cmd_vel: true       # 是否启用 /cmd_vel 控制

# EP 内置 IMU 开关（使用 HI12 外置 IMU 时设为 false）
enable_imu: false

# HI12 外置 IMU 参数
hi12_port: "/dev/hi12_imu" # HI12 串口设备
hi12_baud: 115200          # HI12 波特率
